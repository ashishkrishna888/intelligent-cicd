name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'

    - name: Build with Maven
      run: mvn clean package

    - name: Build Docker Image
      run: docker build -t cicd-app:v1 .

    - name: Run Container
      run: docker run -d -p 9090:9090 --name cicd-container cicd-app:v1

    - name: Health Check
      run: |
        sleep 5
        curl -f http://localhost:9090/health